name: Paper 119 Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

jobs:
  validate-paper119:
    runs-on: ubuntu-latest
    env:
      PAPER119_CANONICAL_PDF: paper/main.pdf

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python entry points
        run: python -m compileall -q src scripts external_validation/runner

      - name: Audit external runner harness
        run: python scripts/audit_external_runner_harness.py

      - name: Audit external backend contract
        run: python scripts/audit_external_backend_contract.py

      - name: Build external backend integration packet
        run: python scripts/build_external_backend_integration_packet.py

      - name: Self-test external backend contract
        run: python scripts/self_test_external_backend_contract.py

      - name: Audit external fidelity acceptance
        run: python scripts/audit_external_fidelity_acceptance.py

      - name: Self-test external fidelity acceptance
        run: python scripts/self_test_external_fidelity_acceptance.py

      - name: Self-test external runner backend path
        run: python scripts/self_test_external_runner_backend.py

      - name: Self-test external collection preflight
        run: python scripts/self_test_external_collection_preflight.py

      - name: Audit external collection readiness
        run: python scripts/audit_external_collection_readiness.py

      - name: Audit external pilot smoke
        run: python scripts/audit_external_pilot_smoke.py

      - name: Build external pilot smoke packet
        run: python scripts/build_external_pilot_smoke_packet.py

      - name: Audit external evidence preflight
        run: python scripts/audit_external_evidence_preflight.py

      - name: Self-test external config evidence
        run: python scripts/self_test_external_config_evidence.py

      - name: Self-test external adapter evidence
        run: python scripts/self_test_external_adapter_evidence.py

      - name: Build external method implementation packet
        run: python scripts/build_external_method_implementation_packet.py

      - name: Plan external config materialization
        run: python scripts/materialize_external_configs.py

      - name: Build external config manifest packet
        run: python scripts/build_external_config_manifest_packet.py

      - name: Build external analysis plan
        run: python scripts/build_external_analysis_plan.py

      - name: Probe external platform environment
        run: python scripts/probe_external_platform.py

      - name: Probe ManiSkill task bindings
        run: python scripts/probe_maniskill_task_bindings.py

      - name: Probe ManiSkill environment smoke
        run: python scripts/probe_maniskill_env_smoke.py

      - name: Build external platform onboarding
        run: python scripts/build_external_platform_onboarding.py

      - name: Build external fidelity provenance packet
        run: python scripts/build_external_fidelity_provenance_packet.py

      - name: Audit external release package
        run: python scripts/audit_external_release_package.py

      - name: Validate external rollouts
        run: python scripts/validate_external_rollouts.py --write-results

      - name: Audit external pairing integrity
        run: python scripts/audit_external_pairing_integrity.py

      - name: Audit external evidence
        run: python scripts/audit_external_evidence.py

      - name: Build external rollout evidence packet
        run: python scripts/build_external_rollout_evidence_packet.py

      - name: Build external acquisition packet
        run: python scripts/build_external_acquisition_packet.py

      - name: Build external operator packet
        run: python scripts/build_external_operator_packet.py

      - name: Build external operator handoff bundle
        run: python scripts/build_external_operator_handoff_bundle.py

      - name: Self-test external release package
        run: python scripts/self_test_external_release_package.py

      - name: Self-test external pairing integrity
        run: python scripts/self_test_external_pairing_integrity.py

      - name: Self-test external rollout validator
        run: python scripts/self_test_external_rollout_validator.py

      - name: Self-test external evidence pipeline
        run: python scripts/self_test_external_evidence_pipeline.py

      - name: Audit external execution readiness
        run: python scripts/audit_external_execution_readiness.py

      - name: Audit claim boundary before readiness gap
        run: python scripts/audit_claim_boundary.py

      - name: Audit submission readiness gap
        run: python scripts/audit_submission_readiness_gap.py

      - name: Audit visible contribution docs
        run: python scripts/audit_visible_contribution.py

      - name: Audit claim boundary after visible docs
        run: python scripts/audit_claim_boundary.py

      - name: Validate submission artifacts
        run: python scripts/validate_submission_artifacts.py

      - name: Validate outreach artifacts
        run: python scripts/validate_outreach_artifacts.py
